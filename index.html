<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструкция: Мои сайты-викторины</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }

        .instruction {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        /* Навигация */
        .nav-bar {
            background: rgba(0, 255, 0, 0.1);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0f0;
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        .nav-controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-btn {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #0f0;
            color: #0f0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 30px #0f0;
            transform: scale(1.1);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .slide-counter {
            font-size: 1.2rem;
            color: #0f0;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #0f0;
        }

        .home-btn {
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            color: #ff00ff;
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }

        .home-btn:hover {
            background: rgba(255, 0, 255, 0.3);
            box-shadow: 0 0 30px #ff00ff;
        }

        /* Контент */
        .slide-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .slide-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f0, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        /* Разделённый экран */
        .split-screen {
            display: flex;
            gap: 30px;
            height: calc(100vh - 200px);
            min-height: 500px;
        }

        .student-side, .teacher-side {
            flex: 1;
            border-radius: 24px;
            padding: 25px;
            position: relative;
            border: 3px solid;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .student-side {
            border-color: #4299e1;
            background: rgba(66, 153, 225, 0.1);
        }

        .teacher-side {
            border-color: #ecc94b;
            background: rgba(236, 201, 75, 0.1);
        }

        .side-label {
            position: absolute;
            top: -15px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 20px;
            border-radius: 50px;
            font-weight: 700;
            border: 2px solid;
            backdrop-filter: blur(5px);
        }

        .student-side .side-label {
            border-color: #4299e1;
            color: #4299e1;
        }

        .teacher-side .side-label {
            border-color: #ecc94b;
            color: #ecc94b;
        }

        /* Карточки */
        .glass-card {
            background: rgba(0, 255, 0, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid #0f0;
            border-radius: 24px;
            padding: 30px;
            margin: 20px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .stat-item {
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
        }

        .stat-icon {
            font-size: 50px;
            margin-bottom: 15px;
            color: #0f0;
        }

        /* Элементы викторины */
        .quiz-question {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }

        .quiz-option {
            background: rgba(0,0,0,0.3);
            border: 2px solid #0f0;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quiz-option:hover {
            background: rgba(0,255,0,0.1);
            transform: translateX(5px);
        }

        .quiz-option.selected {
            background: rgba(0,255,0,0.2);
            border-color: white;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #0f0;
            border-radius: 12px;
            color: #0f0;
            font-size: 1.1rem;
            margin: 10px 0;
        }

        .btn {
            background: rgba(0,255,0,0.1);
            border: 2px solid #0f0;
            color: #0f0;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            background: rgba(0,255,0,0.2);
            box-shadow: 0 0 20px #0f0;
        }

        .results-table {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
        }

        .results-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .results-table th {
            background: rgba(0,255,0,0.2);
            padding: 12px;
            text-align: left;
            color: #0f0;
        }

        .results-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(0,255,0,0.1);
        }

        .note-box {
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin: 50px 0;
        }

        .note-box h3 {
            color: #ff00ff;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .split-screen {
                flex-direction: column;
                height: auto;
            }
        }
    </style>
</head>

        // ============================================
        // НАВИГАЦИЯ
        // ============================================
        let currentSlide = 0;
        const totalSlides = slides.length;

        function updateSlide() {
            document.getElementById('slideContent').innerHTML = slides[currentSlide]();
            document.getElementById('slideCounter').textContent = `${currentSlide + 1} / ${totalSlides}`;
            
            // Блокировка кнопок на краях
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        window.nextSlide = function() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlide();
            }
        };

        window.prevSlide = function() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlide();
            }
        };

        window.goToSlide = function(num) {
            currentSlide = num - 1;
            updateSlide();
        };

        // ============================================
        // ДЕМО-ФУНКЦИИ
        // ============================================
        window.selectDemoAnswer = function(element, selectedIdx, correctIdx) {
            // Снять выделение со всех
            document.querySelectorAll('.quiz-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // Выделить выбранный
            element.classList.add('selected');
            
            const status = document.getElementById('demoAnswerStatus');
            if (selectedIdx === correctIdx) {
                status.innerHTML = '✅ ПРАВИЛЬНО!';
                status.style.background = 'rgba(0,255,0,0.2)';
                status.style.color = '#0f0';
            } else {
                status.innerHTML = '❌ НЕПРАВИЛЬНО';
                status.style.background = 'rgba(255,0,0,0.2)';
                status.style.color = '#ff4444';
            }
        };

            alert('Правильный ответ: ' + QUIZ_DATA.questions[0].options[QUIZ_DATA.questions[0].correct]);

        // Инициализация
        document.addEventListener('DOMContentLoaded', updateSlide);
