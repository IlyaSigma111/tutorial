<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструкция: Мои сайты-викторины</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ФОН С ЭФФЕКТАМИ */
        body::before {
            content: '';
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 0, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 60% 20%, rgba(0, 255, 0, 0.2) 0%, transparent 50%);
            z-index: -1;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .instruction {
            width: 95vw;
            height: 95vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px white;
        }

        /* КОНТЕНТ */
        .content {
            flex: 1;
            padding: 25px 30px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        /* ЗАГОЛОВОК СЛАЙДА */
        .slide-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #ffffff, #c0c0ff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* РАЗДЕЛЁННЫЙ ЭКРАН ДЛЯ ДЕМО */
        .demo-split {
            display: flex;
            gap: 30px;
            height: calc(95vh - 250px);
            min-height: 500px;
        }

        /* ЛЕВАЯ ЧАСТЬ - УЧИТЕЛЬ */
        .teacher-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            border-left: 4px solid #ecc94b;
            position: relative;
        }

        .teacher-panel::before {
            content: '👨‍🏫 УЧИТЕЛЬ';
            position: absolute;
            top: -15px;
            left: 30px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ecc94b;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* ПРАВАЯ ЧАСТЬ - ТЕЛЕФОН УЧЕНИКА */
        .student-phone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-frame {
            width: 320px;
            height: 620px;
            background: #111;
            border-radius: 48px;
            padding: 15px 10px;
            box-shadow: 0 30px 50px -20px black, 0 0 0 2px #333, 0 0 0 4px #222;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: rgba(20, 20, 30, 0.95);
            border-radius: 36px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .phone-notch {
            height: 40px;
            background: #000;
            border-radius: 0 0 20px 20px;
            margin-bottom: 10px;
            position: relative;
        }

        .phone-notch::after {
            content: '●';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-size: 20px;
        }

        .phone-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            color: white;
        }

        .phone-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #4299e1;
            font-weight: 600;
        }

        /* СЕТКА СТАТИСТИКИ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }

        .stat-item h4 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: white;
        }

        .stat-item p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        /* СТЕКЛЯННЫЕ КАРТОЧКИ */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 25px;
            margin: 15px 0;
        }

        .glass-card h3 {
            color: white;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .glass-card ul {
            list-style: none;
        }

        .glass-card li {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ЭЛЕМЕНТЫ ВИКТОРИНЫ */
        .quiz-question {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .quiz-question h3 {
            color: white;
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .quiz-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px 15px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }

        .quiz-option:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .quiz-option.selected {
            background: rgba(66, 153, 225, 0.2);
            border-color: #4299e1;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn.small {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        /* ТАБЛИЦА */
        .results-table {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
        }

        .results-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .results-table th {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            text-align: left;
            color: white;
            font-size: 0.95rem;
        }

        .results-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        /* СПИСОК ИГРОКОВ */
        .players-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .player-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        .player-name {
            color: white;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .player-score {
            color: #ecc94b;
            font-size: 1.1rem;
        }

        /* НИЖНЯЯ ПАНЕЛЬ С БОЛЬШИМИ СТРЕЛКАМИ */
        .bottom-nav {
            padding: 20px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50px;
            font-size: 2.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .slide-counter {
            font-size: 1.5rem;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 35px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
        }

        /* НАВИГАЦИЯ ПО СЛАЙДАМ */
        .note-box {
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 32px;
            padding: 30px;
            text-align: center;
            margin: 30px 0;
        }

        .note-box h3 {
            color: #ff99ff;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .arch-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .step-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
        }

        .step-number {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
        }

        .file-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        .file-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* ССЫЛКИ */
        a {
            color: inherit;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="instruction">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <div class="top-bar">
            <div class="title">
                <i class="fas fa-shield-alt" style="margin-right: 10px;"></i>ИНСТРУКЦИЯ: Сайты-викторины
            </div>
            <div class="home-button" onclick="goToSlide(0)">
                <i class="fas fa-home"></i> НА ГЛАВНУЮ
            </div>
        </div>

        <!-- КОНТЕНТ -->
        <div class="content" id="slideContent"></div>

        <!-- НИЖНЯЯ ПАНЕЛЬ С БОЛЬШИМИ СТРЕЛКАМИ -->
        <div class="bottom-nav">
            <button class="nav-btn" onclick="prevSlide()" id="prevBtn">←</button>
            <span class="slide-counter" id="slideCounter">1 / 10</span>
            <button class="nav-btn" onclick="nextSlide()" id="nextBtn">→</button>
        </div>
    </div>

    <script>
        // ============================================
        // ДАННЫЕ ВИКТОРИНЫ
        // ============================================
        const QUIZ_DATA = {
            questions: [
                { id: 1, text: "Что такое фишинг?", options: ["Вид рыбалки", "Метод кражи данных", "Антивирус", "Шифрование"], correct: 1 },
                { id: 2, text: "Какой пароль ненадёжный?", options: ["G7$k2!mN9", "qwerty123", "Tr0ub4dor&3", "P@ssw0rd"], correct: 1 }
            ]
        };

        // ============================================
        // СЛАЙДЫ
        // ============================================
        const slides = [
            // СЛАЙД 1: Главная
            () => `
                <h1 class="slide-title">📘 ИНСТРУКЦИЯ: Мои сайты-викторины</h1>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-icon">🔒</div><h4>30 вопросов</h4><p>По кибербезопасности</p></div>
                    <div class="stat-item"><div class="stat-icon">👥</div><h4>Два режима</h4><p>Ученик и Учитель</p></div>
                    <div class="stat-item"><div class="stat-icon">⚡</div><h4>Real-time</h4><p>Синхронизация</p></div>
                    <div class="stat-item"><div class="stat-icon">📊</div><h4>Статистика</h4><p>Таблица лидеров</p></div>
                </div>
                <div class="glass-card">
                    <h3>🎯 Что вы увидите:</h3>
                    <ul>
                        <li>• Как устроена архитектура</li>
                        <li>• Как подключается ученик</li>
                        <li>• Как учитель управляет игрой</li>
                        <li>• Как выглядит активный вопрос</li>
                        <li>• Где смотреть статистику</li>
                    </ul>
                </div>
            `,
            
            // СЛАЙД 2: Архитектура
            () => `
                <h1 class="slide-title">🏗 Архитектура проекта</h1>
                <div class="arch-grid">
                    <div class="glass-card"><h3>Frontend</h3><ul><li>HTML + CSS</li><li>JavaScript</li><li>Glassmorphism</li></ul></div>
                    <div class="glass-card"><h3>Backend</h3><ul><li>Firebase</li><li>Realtime DB</li><li>Синхронизация</li></ul></div>
                </div>
            `,
            
            // СЛАЙД 3: Два режима
            () => `
                <h1 class="slide-title">👥 Роли: Ученик и Учитель</h1>
                <div style="display: flex; gap: 20px;">
                    <div class="glass-card" style="flex:1; border-left: 4px solid #4299e1;"><h3 style="color:#4299e1;">👨‍🎓 Ученик</h3><ul><li>Ввод имени и кода</li><li>Ответы на вопросы</li><li>Свой счёт</li></ul></div>
                    <div class="glass-card" style="flex:1; border-left: 4px solid #ecc94b;"><h3 style="color:#ecc94b;">👨‍🏫 Учитель</h3><ul><li>Создание игры</li><li>Код викторины</li><li>Управление</li><li>Статистика</li></ul></div>
                </div>
            `,
            
            // СЛАЙД 4: Подключение
            () => `
                <h1 class="slide-title">🔌 Подключение ученика</h1>
                <div class="glass-card">
                    <p style="color:white; font-size:1.2rem;">1. Учитель создаёт игру → получает код (8 цифр)</p>
                    <p style="color:white; font-size:1.2rem; margin-top:15px;">2. Ученик вводит имя и код → подключается</p>
                    <p style="color:white; font-size:1.2rem; margin-top:15px;">3. Учитель видит список игроков</p>
                </div>
            `,
            
            // СЛАЙД 5: Активный вопрос
            () => `
                <h1 class="slide-title">❓ Активный вопрос</h1>
                <div class="glass-card">
                    <p style="color:white; font-size:1.2rem;">Учитель нажимает "Следующий вопрос"</p>
                    <p style="color:white; font-size:1.2rem; margin-top:15px;">Ученики видят вопрос и выбирают ответ</p>
                    <p style="color:white; font-size:1.2rem; margin-top:15px;">Учитель видит, кто ответил</p>
                </div>
            `,
            
            // СЛАЙД 6: Показ ответа
            () => `
                <h1 class="slide-title">✅ Показ правильного ответа</h1>
                <div class="glass-card">
                    <p style="color:white; font-size:1.2rem;">Учитель нажимает "Показать ответ"</p>
                    <p style="color:white; font-size:1.2rem; margin-top:15px;">Все видят правильный вариант и объяснение</p>
                    <p style="color:white; font-size:1.2rem; margin-top:15px;">Ученикам начисляются очки</p>
                </div>
            `,
            
            // СЛАЙД 7: Статистика
            () => `
                <h1 class="slide-title">📊 Таблица лидеров</h1>
                <div class="glass-card">
                    <p style="color:white; font-size:1.2rem;">Учитель видит:</p>
                    <ul style="margin-top:15px;">
                        <li>• Кто ответил правильно</li>
                        <li>• Текущий счёт каждого</li>
                        <li>• Общую статистику</li>
                    </ul>
                </div>
            `,
            
            // СЛАЙД 8: Алгоритм
            () => `
                <h1 class="slide-title">📋 Алгоритм работы</h1>
                <div class="steps-grid">
                    <div class="step-card"><div class="step-number">1</div><p>Создание игры</p></div>
                    <div class="step-card"><div class="step-number">2</div><p>Подключение</p></div>
                    <div class="step-card"><div class="step-number">3</div><p>Вопрос</p></div>
                    <div class="step-card"><div class="step-number">4</div><p>Ответы</p></div>
                    <div class="step-card"><div class="step-number">5</div><p>Результаты</p></div>
                </div>
            `,
            
            // СЛАЙД 9: Примечание
            () => `
                <h1 class="slide-title">⚠️ Важно</h1>
                <div class="note-box">
                    <h3>Это просто пример</h3>
                    <p>Принцип работы одинаков для всех моих викторин.<br>Меняется только тема и дизайн.</p>
                </div>
            `,
            
            // СЛАЙД 10: ЖИВОЕ ДЕМО
            () => `
                <h1 class="slide-title">🎮 Живая демонстрация</h1>
                
                <div class="demo-split">
                    <!-- ЛЕВАЯ ЧАСТЬ: УЧИТЕЛЬ -->
                    <div class="teacher-panel">
                        <h3 style="color:#ecc94b; margin-bottom:20px;">📋 ПАНЕЛЬ УПРАВЛЕНИЯ</h3>
                        
                        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
                            <button class="btn small" onclick="demoCreateGame()">➕ СОЗДАТЬ</button>
                            <button class="btn small" onclick="demoNextQuestion()">⏯ ВОПРОС</button>
                            <button class="btn small" onclick="demoShowAnswer()">✅ ОТВЕТ</button>
                        </div>
                        
                        <div style="background: rgba(0,0,0,0.3); border-radius: 16px; padding: 15px; margin-bottom: 20px;">
                            <div style="display: flex; justify-content: space-between;">
                                <span>Код игры:</span>
                                <span style="color:#ecc94b; font-size:1.8rem; letter-spacing: 5px;">12345678</span>
                            </div>
                            <div style="margin-top: 10px;">Игроков: <span id="demoPlayerCount">3</span></div>
                        </div>
                        
                        <h4 style="color:white;">👥 ИГРОКИ:</h4>
                        <div class="players-list" id="demoPlayersList">
                            <div class="player-card"><div class="player-name">Анна</div><div class="player-score">12</div></div>
                            <div class="player-card"><div class="player-name">Иван</div><div class="player-score">8</div></div>
                            <div class="player-card"><div class="player-name">Мария</div><div class="player-score">15</div></div>
                        </div>
                        
                        <div class="results-table" style="margin-top: 20px;" id="demoStats">
                            <table>
                                <tr><th>Вопрос</th><th>Ответили</th></tr>
                                <tr><td>1</td><td>3/3</td></tr>
                                <tr><td>2</td><td>2/3</td></tr>
                            </table>
                        </div>
                    </div>
                    
                    <!-- ПРАВАЯ ЧАСТЬ: ТЕЛЕФОН УЧЕНИКА -->
                    <div class="student-phone">
                        <div class="phone-frame">
                            <div class="phone-screen">
                                <div class="phone-notch"></div>
                                <div class="phone-content" id="phoneContent">
                                    <div class="phone-header">📱 КИБЕР КАХУТ</div>
                                    
                                    <div style="background: rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; margin-bottom: 15px;">
                                        <div style="display: flex; justify-content: space-between; color:#4299e1;">
                                            <span>Анна</span>
                                            <span>12 очков</span>
                                        </div>
                                    </div>
                                    
                                    <div class="quiz-question" id="demoQuestion">
                                        <h3>Что такое фишинг?</h3>
                                        <div class="quiz-option" onclick="demoSelectAnswer(this, 0)">Вид рыбалки</div>
                                        <div class="quiz-option" onclick="demoSelectAnswer(this, 1)">Метод кражи данных</div>
                                        <div class="quiz-option" onclick="demoSelectAnswer(this, 2)">Антивирус</div>
                                        <div class="quiz-option" onclick="demoSelectAnswer(this, 3)">Шифрование</div>
                                    </div>
                                    
                                    <div id="phoneStatus" style="text-align: center; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-top: 10px;">
                                        ⏳ Выбери ответ
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <p style="text-align: center; margin-top: 15px; color: rgba(255,255,255,0.5);">
                    👆 Нажимай на кнопки и варианты ответов — всё работает!
                </p>
            `
        ];

        // ============================================
        // НАВИГАЦИЯ
        // ============================================
        let currentSlide = 0;
        const totalSlides = slides.length;

        function updateSlide() {
            document.getElementById('slideContent').innerHTML = slides[currentSlide]();
            document.getElementById('slideCounter').textContent = `${currentSlide + 1} / ${totalSlides}`;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        window.nextSlide = function() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlide();
            }
        };

        window.prevSlide = function() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlide();
            }
        };

        window.goToSlide = function(num) {
            currentSlide = num;
            updateSlide();
        };

        // ============================================
        // ДЕМО-ФУНКЦИИ ДЛЯ СЛАЙДА 10
        // ============================================
        window.demoCreateGame = function() {
            alert('✅ Игра создана! Код: 12345678');
        };

        window.demoNextQuestion = function() {
            document.getElementById('demoQuestion').innerHTML = `
                <h3>Что такое 2FA?</h3>
                <div class="quiz-option" onclick="demoSelectAnswer(this, 0)">Второй аккаунт</div>
                <div class="quiz-option" onclick="demoSelectAnswer(this, 1)">Двухфакторная аутентификация</div>
                <div class="quiz-option" onclick="demoSelectAnswer(this, 2)">Файловая система</div>
                <div class="quiz-option" onclick="demoSelectAnswer(this, 3)">Тип вируса</div>
            `;
            document.getElementById('phoneStatus').innerHTML = '⏳ Новый вопрос! Выбери ответ';
            document.getElementById('phoneStatus').style.background = 'rgba(0,0,0,0.3)';
        };

        window.demoShowAnswer = function() {
            document.getElementById('phoneStatus').innerHTML = '✅ Правильный ответ: Двухфакторная аутентификация';
            document.getElementById('phoneStatus').style.background = 'rgba(0,255,0,0.2)';
        };

        window.demoSelectAnswer = function(element, idx) {
            // Снять выделение
            document.querySelectorAll('.quiz-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // Выделить выбранный
            element.classList.add('selected');
            
            // Показать результат
            const isCorrect = (idx === 1); // Для первого вопроса правильный ответ 1, для второго тоже 1
            if (isCorrect) {
                document.getElementById('phoneStatus').innerHTML = '✅ ПРАВИЛЬНО! +1 очко';
                document.getElementById('phoneStatus').style.background = 'rgba(0,255,0,0.2)';
            } else {
                document.getElementById('phoneStatus').innerHTML = '❌ НЕПРАВИЛЬНО';
                document.getElementById('phoneStatus').style.background = 'rgba(255,0,0,0.2)';
            }
        };

        // Инициализация
        document.addEventListener('DOMContentLoaded', updateSlide);
    </script>
</body>
</html>
