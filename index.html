<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструкция: Сайты-викторины</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ФОН С БЛИКАМИ */
        body::before {
            content: '';
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 30%, rgba(100, 150, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(150, 100, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 40% 20%, rgba(255, 200, 100, 0.3) 0%, transparent 50%);
            z-index: -1;
        }

        /* ОСНОВНОЕ СТЕКЛО */
        .instruction {
            width: 100vw;
            height: 100vh;
            background: rgba(20, 25, 35, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .title {
            font-size: 2rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .title i {
            color: #aaccff;
        }

        .home-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .home-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* КОНТЕНТ */
        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        /* КАРТОЧКА ШАГА */
        .step-card {
            width: 90%;
            max-width: 1400px;
            background: rgba(30, 35, 45, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px -20px black;
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .step-number {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
        }

        .step-title {
            font-size: 2.5rem;
            font-weight: 600;
            color: white;
        }

        .step-subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 1.2rem;
            margin-top: 5px;
        }

        /* ФРАГМЕНТ ИНТЕРФЕЙСА */
        .interface-fragment {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 36px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        .fragment-label {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 30px;
            color: #aaa;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        /* ТОЧНАЯ КОПИЯ ПАНЕЛИ УЧИТЕЛЯ */
        .teacher-panel-exact {
            background: #1a1a2a;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #333;
            font-family: 'Share Tech Mono', monospace;
        }

        .teacher-header-exact {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .teacher-title-exact {
            color: #0f0;
            font-size: 1.2rem;
        }

        .game-code-exact {
            background: #000;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #0f0;
            color: #0f0;
            font-size: 2rem;
            letter-spacing: 5px;
        }

        .control-buttons-exact {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .ctrl-btn-exact {
            background: #0f0;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .players-section-exact {
            background: #000;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .players-grid-exact {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .player-card-exact {
            background: #1a1a2a;
            border: 1px solid #0f0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .player-name-exact {
            color: #0f0;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stats-table-exact {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }

        .stats-table-exact table {
            width: 100%;
            border-collapse: collapse;
        }

        .stats-table-exact th {
            background: #1a1a2a;
            color: #0f0;
            padding: 12px;
            text-align: left;
        }

        .stats-table-exact td {
            padding: 10px 12px;
            border-bottom: 1px solid #333;
            color: white;
        }

        /* ТЕЛЕФОН УЧЕНИКА */
        .student-phone-exact {
            width: 300px;
            margin: 0 auto;
        }

        .phone-frame-exact {
            background: #111;
            border-radius: 40px;
            padding: 12px 6px;
            box-shadow: 0 30px 40px -20px black;
        }

        .phone-screen-exact {
            background: #1a1a2a;
            border-radius: 32px;
            height: 550px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .phone-header-exact {
            background: #000;
            padding: 15px;
            text-align: center;
            color: #4299e1;
            border-bottom: 1px solid #333;
        }

        .phone-body-exact {
            flex: 1;
            padding: 20px;
            color: white;
        }

        .question-box-exact {
            background: #000;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #4299e1;
        }

        .option-exact {
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin: 8px 0;
            color: white;
        }

        /* НИЖНЯЯ НАВИГАЦИЯ */
        .bottom-nav {
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2.5rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .slide-counter {
            font-size: 1.8rem;
            color: white;
            background: rgba(255,255,255,0.05);
            padding: 15px 50px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="instruction">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <div class="top-bar">
            <div class="title">
                <i class="fas fa-shield-alt"></i> ИНСТРУКЦИЯ: САЙТЫ-ВИКТОРИНЫ
            </div>
            <div class="home-btn" onclick="goToSlide(0)">ПЕРВЫЙ ШАГ</div>
        </div>

        <!-- КОНТЕНТ -->
        <div class="content" id="slideContent"></div>

        <!-- НИЖНЯЯ НАВИГАЦИЯ -->
        <div class="bottom-nav">
            <button class="nav-btn" onclick="prevSlide()" id="prevBtn">←</button>
            <span class="slide-counter" id="slideCounter">1 / 6</span>
            <button class="nav-btn" onclick="nextSlide()" id="nextBtn">→</button>
        </div>
    </div>

    <script>
        const slides = [
            // ШАГ 1: Создание игры
            () => `
                <div class="step-card">
                    <div class="step-header">
                        <div class="step-number">1</div>
                        <div>
                            <div class="step-title">СОЗДАНИЕ ИГРЫ</div>
                            <div class="step-subtitle">Нажмите кнопку "СОЗДАТЬ" — появится код</div>
                        </div>
                    </div>
                    
                    <div class="interface-fragment">
                        <div class="fragment-label">🔍 ФРАГМЕНТ: Панель учителя</div>
                        <div class="teacher-panel-exact">
                            <div class="teacher-header-exact">
                                <span class="teacher-title-exact">👨‍🏫 ПАНЕЛЬ УЧИТЕЛЯ</span>
                                <div class="game-code-exact">12345678</div>
                            </div>
                            
                            <div class="control-buttons-exact">
                                <button class="ctrl-btn-exact" style="background:#0f0;">➕ СОЗДАТЬ</button>
                                <button class="ctrl-btn-exact" style="background:#333; color:#666;" disabled>⏯ ВОПРОС</button>
                                <button class="ctrl-btn-exact" style="background:#333; color:#666;" disabled>✅ ОТВЕТ</button>
                                <button class="ctrl-btn-exact" style="background:#333; color:#666;" disabled>⏩ ДАЛЕЕ</button>
                            </div>
                            
                            <div class="players-section-exact">
                                <div style="color:#0f0; margin-bottom:10px;">👥 УЧЕНИКИ (0)</div>
                                <div style="color:#666; text-align:center; padding:20px;">Ожидание подключения...</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="color:white; font-size:1.2rem; text-align:center;">
                        ✅ После создания код (12345678) появляется автоматически
                    </div>
                </div>
            `,
            
            // ШАГ 2: Подключение ученика
            () => `
                <div class="step-card">
                    <div class="step-header">
                        <div class="step-number">2</div>
                        <div>
                            <div class="step-title">ПОДКЛЮЧЕНИЕ УЧЕНИКА</div>
                            <div class="step-subtitle">Ученик вводит имя и код на телефоне</div>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 40px; align-items: center;">
                        <div style="flex: 1;">
                            <div class="interface-fragment">
                                <div class="fragment-label">📱 ФРАГМЕНТ: Экран ученика</div>
                                <div class="student-phone-exact">
                                    <div class="phone-frame-exact">
                                        <div class="phone-screen-exact">
                                            <div class="phone-header-exact">📱 ПОДКЛЮЧЕНИЕ</div>
                                            <div class="phone-body-exact">
                                                <div style="background:#000; border-radius:12px; padding:20px;">
                                                    <input type="text" placeholder="Твоё имя" value="Анна" style="width:100%; padding:12px; margin-bottom:15px; background:#1a1a2a; border:1px solid #4299e1; color:white; border-radius:8px;">
                                                    <input type="text" placeholder="Код игры" value="12345678" style="width:100%; padding:12px; margin-bottom:20px; background:#1a1a2a; border:1px solid #4299e1; color:white; border-radius:8px;">
                                                    <button style="width:100%; padding:15px; background:#4299e1; border:none; color:white; border-radius:12px; font-weight:600;">🔌 ПОДКЛЮЧИТЬСЯ</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div style="flex: 1;">
                            <div class="interface-fragment">
                                <div class="fragment-label">👨‍🏫 Панель учителя (после подключения)</div>
                                <div class="teacher-panel-exact">
                                    <div class="players-section-exact">
                                        <div style="color:#0f0; margin-bottom:10px;">👥 УЧЕНИКИ (1)</div>
                                        <div class="players-grid-exact">
                                            <div class="player-card-exact">
                                                <div class="player-name-exact">Анна</div>
                                                <div style="color:#0f0;">0 очков</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            
            // ШАГ 3: Запуск вопроса
            () => `
                <div class="step-card">
                    <div class="step-header">
                        <div class="step-number">3</div>
                        <div>
                            <div class="step-title">ЗАПУСК ВОПРОСА</div>
                            <div class="step-subtitle">Учитель нажимает "ВОПРОС" — у всех появляется задание</div>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 40px;">
                        <div style="flex: 1;">
                            <div class="interface-fragment">
                                <div class="fragment-label">👨‍🏫 Действие учителя</div>
                                <div class="teacher-panel-exact">
                                    <div class="control-buttons-exact">
                                        <button class="ctrl-btn-exact" style="background:#333; color:#666;" disabled>➕ СОЗДАТЬ</button>
                                        <button class="ctrl-btn-exact" style="background:#0f0;">▶ ВОПРОС</button>
                                        <button class="ctrl-btn-exact" style="background:#333; color:#666;" disabled>✅ ОТВЕТ</button>
                                        <button class="ctrl-btn-exact" style="background:#333; color:#666;" disabled>⏩ ДАЛЕЕ</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div style="flex: 1;">
                            <div class="interface-fragment">
                                <div class="fragment-label">📱 Что видит ученик</div>
                                <div class="student-phone-exact">
                                    <div class="phone-frame-exact">
                                        <div class="phone-screen-exact">
                                            <div class="phone-header-exact">📱 Анна | 0 очков</div>
                                            <div class="phone-body-exact">
                                                <div class="question-box-exact">
                                                    <div style="color:#4299e1; margin-bottom:10px;">ВОПРОС 1/30</div>
                                                    <div style="font-size:1.2rem;">Что такое фишинг?</div>
                                                </div>
                                                <div class="option-exact">Вид рыбалки</div>
                                                <div class="option-exact">Кража данных</div>
                                                <div class="option-exact">Антивирус</div>
                                                <div class="option-exact">Шифрование</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            
            // ШАГ 4: Ответ ученика
            () => `
                <div class="step-card">
                    <div class="step-header">
                        <div class="step-number">4</div>
                        <div>
                            <div class="step-title">ОТВЕТ УЧЕНИКА</div>
                            <div class="step-subtitle">Ученик выбирает вариант — учитель видит статистику</div>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 40px;">
                        <div style="flex: 1;">
                            <div class="interface-fragment">
                                <div class="fragment-label">📱 Ученик выбрал ответ</div>
                                <div class="student-phone-exact">
                                    <div class="phone-frame-exact">
                                        <div class="phone-screen-exact">
                                            <div class="phone-header-exact">📱 Анна | 0 очков</div>
                                            <div class="phone-body-exact">
                                                <div class="question-box-exact">Что такое фишинг?</div>
                                                <div class="option-exact" style="border-color:#4299e1; background:#1a3a5a;">Вид рыбалки</div>
                                                <div class="option-exact" style="background:#0f0; color:black; border-color:#0f0;">✓ Кража данных</div>
                                                <div class="option-exact">Антивирус</div>
                                                <div class="option-exact">Шифрование</div>
                                                <div style="text-align:center; margin-top:15px; color:#0f0;">✅ Ожидание ответа учителя</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div style="flex: 1;">
                            <div class="interface-fragment">
                                <div class="fragment-label">👨‍🏫 Учитель видит кто ответил</div>
                                <div class="teacher-panel-exact">
                                    <div class="stats-table-exact">
                                        <table>
                                            <tr><th>Ученик</th><th>Ответ</th><th>Статус</th></tr>
                                            <tr><td>Анна</td><td>Кража данных</td><td style="color:#0f0;">✅</td></tr>
                                            <tr><td>Иван</td><td>—</td><td style="color:#aaa;">⏳</td></tr>
                                            <tr><td>Мария</td><td>Вид рыбалки</td><td style="color:#0f0;">✅</td></tr>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            
            // ШАГ 5: Показ ответа
            () => `
                <div class="step-card">
                    <div class="step-header">
                        <div class="step-number">5</div>
                        <div>
                            <div class="step-title">ПОКАЗ ПРАВИЛЬНОГО ОТВЕТА</div>
                            <div class="step-subtitle">Учитель нажимает "ОТВЕТ" — все видят объяснение</div>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 40px;">
                        <div style="flex: 1;">
                            <div class="interface-fragment">
                                <div class="fragment-label">👨‍🏫 Действие учителя</div>
                                <div class="teacher-panel-exact">
                                    <div class="control-buttons-exact">
                                        <button class="ctrl-btn-exact" style="background:#333; color:#666;" disabled>➕ СОЗДАТЬ</button>
                                        <button class="ctrl-btn-exact" style="background:#333; color:#666;" disabled>▶ ВОПРОС</button>
                                        <button class="ctrl-btn-exact" style="background:#0f0;">✅ ОТВЕТ</button>
                                        <button class="ctrl-btn-exact" style="background:#333; color:#666;" disabled>⏩ ДАЛЕЕ</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div style="flex: 1;">
                            <div class="interface-fragment">
                                <div class="fragment-label">📱 Что видит ученик</div>
                                <div class="student-phone-exact">
                                    <div class="phone-frame-exact">
                                        <div class="phone-screen-exact">
                                            <div class="phone-header-exact">📱 Анна | +1 очко</div>
                                            <div class="phone-body-exact">
                                                <div class="question-box-exact">Что такое фишинг?</div>
                                                <div style="background:#0f0; color:black; padding:15px; border-radius:12px; margin-bottom:15px;">
                                                    ✓ Правильно: Кража данных
                                                </div>
                                                <div style="background:#2a2a3a; padding:15px; border-radius:12px; color:#ccc;">
                                                    <strong>Объяснение:</strong> Фишинг — вид мошенничества, целью которого является получение доступа к данным пользователей.
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            
            // ШАГ 6: Результаты
            () => `
                <div class="step-card">
                    <div class="step-header">
                        <div class="step-number">6</div>
                        <div>
                            <div class="step-title">ТАБЛИЦА ЛИДЕРОВ</div>
                            <div class="step-subtitle">Итоговая статистика после всех вопросов</div>
                        </div>
                    </div>
                    
                    <div class="interface-fragment">
                        <div class="fragment-label">👨‍🏫 ПОЛНАЯ ПАНЕЛЬ УЧИТЕЛЯ (ТОЧНАЯ КОПИЯ)</div>
                        <div class="teacher-panel-exact">
                            <div class="teacher-header-exact">
                                <span class="teacher-title-exact">👨‍🏫 ПАНЕЛЬ УЧИТЕЛЯ</span>
                                <div class="game-code-exact">12345678</div>
                            </div>
                            
                            <div class="control-buttons-exact">
                                <button class="ctrl-btn-exact">➕ СОЗДАТЬ</button>
                                <button class="ctrl-btn-exact">▶ ВОПРОС</button>
                                <button class="ctrl-btn-exact">✅ ОТВЕТ</button>
                                <button class="ctrl-btn-exact">⏩ ДАЛЕЕ</button>
                            </div>
                            
                            <div class="players-section-exact">
                                <div style="color:#0f0; margin-bottom:10px;">👥 УЧЕНИКИ (4)</div>

        let currentSlide = 0;
        const totalSlides = slides.length;

        function updateSlide() {
            document.getElementById('slideContent').innerHTML = slides[currentSlide]();
            document.getElementById('slideCounter').textContent = `${currentSlide + 1} / ${totalSlides}`;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        window.nextSlide = function() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlide();
            }
        };

        window.prevSlide = function() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlide();
            }
        };

        window.goToSlide = function(num) {
            currentSlide = num;
            updateSlide();
        };

        document.addEventListener('DOMContentLoaded', updateSlide);
    </script>
